name: CI/CD - medishift-auth-service

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: SonarQube SAST
  # ─────────────────────────────────────────
  sonarqube:
    name: "Stage 1 - SonarQube SAST"
    uses: MediShift-devops-project/medishift-templates/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: medishift-auth-service
      working_directory: .
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ─────────────────────────────────────────
  # STAGE 2: Build + Snyk SCA
  # ─────────────────────────────────────────
  build-snyk:
    name: "Stage 2 - Build + Snyk SCA"
    needs: sonarqube
    uses: MediShift-devops-project/medishift-templates/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: medishift-auth-service
      working_directory: .
      node_version: '18'
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ─────────────────────────────────────────
  # STAGE 3: Docker Build + Trivy + Push
  # Skipped on Pull Requests
  # ─────────────────────────────────────────
  docker:
    name: "Stage 3 - Docker Build + Trivy + Push"
    needs: build-snyk
    if: github.event_name == 'push'
    uses: MediShift-devops-project/medishift-templates/.github/workflows/template-docker.yml@main
    with:
      service_name: medishift-auth-service
      image_name: medishift-auth
      working_directory: .
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ─────────────────────────────────────────
  # STAGE 4: Approval Gate
  # develop → deploys to development env
  # main    → deploys to production env
  # ─────────────────────────────────────────
  approval:
    name: "Stage 4 - Approval Gate"
    needs: docker
    if: github.event_name == 'push'
    uses: MediShift-devops-project/medishift-templates/.github/workflows/template-approval-gate.yml@main
    with:
      service_name: medishift-auth-service
      image_version: ${{ needs.docker.outputs.image_version }}
      target_environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
      target_namespace: ${{ github.ref_name == 'main' && 'medishift-prod' || 'medishift-dev' }}
    secrets:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ─────────────────────────────────────────
  # STAGE 5: CD - Update Helm Manifests
  # develop → updates values-dev.yaml
  # main    → updates values-prod.yaml
  # ─────────────────────────────────────────
  deploy:
    name: "Stage 5 - Update Helm Manifests (CD)"
    needs: [docker, approval]
    if: github.event_name == 'push'
    uses: MediShift-devops-project/medishift-templates/.github/workflows/template-cd.yml@main
    with:
      service_name: medishift-auth-service
      service_key: auth
      image_version: ${{ needs.docker.outputs.image_version }}
      branch: ${{ github.ref_name }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ─────────────────────────────────────────
  # STAGE 6: Success Notification
  # ─────────────────────────────────────────
  notify-success:
    name: "Stage 6 - Success Notification"
    needs: [sonarqube, build-snyk, docker, approval, deploy]
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ SUCCESS - medishift-auth-service → ${{ github.ref_name == 'main' && 'PRODUCTION' || 'DEVELOPMENT' }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediShift DevOps <${{ secrets.SMTP_USERNAME }}>
          body: |
            ✅ FULL CI/CD PIPELINE SUCCESSFUL
            ══════════════════════════════════════════
            
            Service:      medishift-auth-service
            Version:      ${{ needs.docker.outputs.image_version }}
            Environment:  ${{ github.ref_name == 'main' && 'PRODUCTION' || 'DEVELOPMENT' }}
            Namespace:    ${{ github.ref_name == 'main' && 'medishift-prod' || 'medishift-dev' }}
            Branch:       ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Commit:       ${{ github.sha }}
            
            ══════════════════════════════════════════
            PIPELINE STAGES:
            ✅ Stage 1 - SonarQube SAST Scan
            ✅ Stage 2 - NPM Build + Snyk SCA
            ✅ Stage 3 - Docker Build + Trivy Scan
            ✅ Stage 4 - Approval Gate Passed
            ✅ Stage 5 - Helm Manifest Updated
            ✅ Stage 6 - Notification Sent
            ══════════════════════════════════════════
            
            IMAGES PUSHED TO DOCKERHUB:
            📦 revanth654/medishift-auth:${{ needs.docker.outputs.image_version }}
            📦 revanth654/medishift-auth:${{ needs.docker.outputs.image_full_tag }}
            📦 revanth654/medishift-auth:latest
            
            ArgoCD will auto-sync within 3 minutes.
            Monitor: kubectl get pods -n ${{ github.ref_name == 'main' && 'medishift-prod' || 'medishift-dev' }}
            
            ══════════════════════════════════════════
            -- MediShift DevOps Pipeline
